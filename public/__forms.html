<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Form Detection</title>
</head>
<body>
    <!-- 
        This file is required for Netlify Forms to work with Next.js Runtime v5.
        Netlify's post-processor scans this static file at deploy time to detect the form.
        Users will never see this page.
    -->
    <form name="contact" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
